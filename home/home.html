<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Protected</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app" style="display: none; width: 100%;">
        <header>
            <h2>Shop - Clothes Category</h2>
            <div>
                <span>Welcome, <strong id="displayUsername"></strong> (<span id="displayEmail"></span>)</span>
                <button id="logoutBtn" style="margin-left: 15px;">Logout</button>
            </div>
        </header>

        <div class="container">
            <div class="main-content">
                <div class="filters">
                    <label><strong>Filter by Price:</strong></label>
                    <input type="number" id="minPrice" placeholder="Min $" min="0">
                    <span>-</span>
                    <input type="number" id="maxPrice" placeholder="Max $" min="0">
                    <button id="applyFilterBtn">Apply Filter</button>
                    <button id="resetFilterBtn" style="background:#95a5a6;">Reset</button>
                </div>

                <div id="loadingProducts">Loading products...</div>
                <div class="products-grid" id="productsContainer">
                    <!-- Products will be dynamically inserted here -->
                </div>
            </div>

            <div class="sidebar">
                <h2>Your Cart</h2>
                <div class="cart-items" id="cartItemsContainer">
                    <p style="color: #7f8c8d;">Cart is empty.</p>
                </div>
                
                <div class="cart-summary">
                    <h3>Total: <span id="cartTotal">$0.00</span></h3>
                    <button id="checkoutBtn" class="btn-checkout">Checkout</button>
                    <div id="checkoutStatus" class="status-message"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
